version: 2

builds:
  - main: ./cmd/jg
    binary: jg
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - completions/*
      - plugin/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

brews:
  - repository:
      owner: silee-tools
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/silee-tools/jg"
    description: "A frecency-based CLI for quickly jumping to Git repositories"
    license: "MIT"
    dependencies:
      - name: fzf
    install: |
      bin.install "jg"
      zsh_completion.install "completions/_jg"
      bash_completion.install "completions/jg.bash" => "jg"
      (share/"jg"/"plugin").install "plugin/jg.plugin.zsh"
    caveats: |
      Run 'jg setup' to configure shell integration,
      then restart your shell or run: exec $SHELL
    test: |
      assert_match "jg", shell_output("#{bin}/jg --help 2>&1")
